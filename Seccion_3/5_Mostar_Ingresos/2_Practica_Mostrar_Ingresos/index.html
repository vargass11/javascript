<!DOCTYPE html>
<head>
    <title>Ingreso de Usuario 2</title>
</head>

<body>
    <input type="text" id="inputTexto" value="Luis Miguel">
    <button onclick="MostrarTexto()">Click aquí</button>
    <h1 id="titulo"></h1>
    <script>
        function mostrarTexto(){
            let elementoNombre= document.getElementById("InputTexto");
            let elementoTitulo= document.getElementById("Titulo");
            let mensaje = "mi artista favorito es" + elementoNombre.value

            elementoTitulo.textContent = mensaje;
        }
    </script>
</body>
